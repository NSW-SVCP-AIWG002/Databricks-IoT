<div class="modal__header">
  <h2 class="modal__title">ガジェットタイトル更新</h2>
</div>

<form
  method="POST"
  action="{{ url_for('customer_dashboard.gadget_update', gadget_uuid=gadget.gadget_uuid) }}"
  class="modal-form"
  data-ajax-submit
>
  {{ form.hidden_tag() }}

  <div class="modal__body">
    <div class="form__group">
      <label class="form__label form__label--required" for="{{ form.gadget_name.id }}">
        ガジェットタイトル
      </label>
      {{ form.gadget_name(class="form__input") }}
      {% if form.gadget_name.errors %}
        <ul class="form__errors">
          {% for error in form.gadget_name.errors %}
            <li class="form__error">{{ error }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    </div>
  </div>

  <div class="modal__footer">
    <button type="submit" class="button button--primary">更新</button>
    <button type="button" class="button button--secondary" id="modal-close-btn">キャンセル</button>
  </div>
</form>
