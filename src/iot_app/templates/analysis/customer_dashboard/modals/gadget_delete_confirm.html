<div class="modal__header">
  <h2 class="modal__title">ガジェット削除確認</h2>
</div>

<form
  method="POST"
  action="{{ url_for('customer_dashboard.gadget_delete', gadget_uuid=gadget.gadget_uuid) }}"
  class="modal-form"
>
  {{ form.hidden_tag() if form is defined else '' }}

  <div class="modal__body">
    <p>選択したガジェットを削除しますか？</p>
    <p class="modal__warning">この操作は取り消すことができません。</p>
  </div>

  <div class="modal__footer">
    <button type="submit" class="button button--danger">削除</button>
    <button type="button" class="button button--secondary" id="modal-close-btn">キャンセル</button>
  </div>
</form>
