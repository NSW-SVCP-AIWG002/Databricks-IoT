<div class="modal__header">
  <h2 class="modal__title">ダッシュボードグループ登録</h2>
</div>

<form
  method="POST"
  action="{{ url_for('customer_dashboard.group_register') }}"
  class="modal-form"
  novalidate
>
  {{ form.hidden_tag() }}
  {{ form.dashboard_uuid() }}

  <div class="modal__body">
    <div class="form-group">
      <label class="form-label" for="{{ form.dashboard_group_name.id }}">
        ダッシュボードグループタイトル<span class="form-label__required">必須</span>
      </label>
      {{ form.dashboard_group_name(class="form-input", placeholder="グループタイトルを入力してください") }}
      {% if form.dashboard_group_name.errors %}
        <span class="form-error">{{ form.dashboard_group_name.errors[0] }}</span>
      {% endif %}
    </div>
  </div>

  <div class="modal__footer">
    <button type="submit" class="button button--primary">登録</button>
    <button type="button" class="button button--secondary" id="modal-close-btn">キャンセル</button>
  </div>
</form>
