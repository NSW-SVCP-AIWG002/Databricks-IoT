<div class="modal__header">
  <h2 class="modal__title">ダッシュボードグループ登録</h2>
</div>

<form
  method="POST"
  action="{{ url_for('customer_dashboard.group_register') }}"
  class="modal-form"
  data-ajax-submit
>
  {{ form.hidden_tag() }}
  {{ form.dashboard_uuid() }}

  <div class="modal__body">
    <div class="form__group">
      <label class="form__label form__label--required" for="{{ form.dashboard_group_name.id }}">
        ダッシュボードグループタイトル
      </label>
      {{ form.dashboard_group_name(class="form__input", placeholder="グループタイトルを入力してください") }}
      {% if form.dashboard_group_name.errors %}
        <ul class="form__errors">
          {% for error in form.dashboard_group_name.errors %}
            <li class="form__error">{{ error }}</li>
          {% endfor %}
        </ul>
      {% endif %}
    </div>
  </div>

  <div class="modal__footer">
    <button type="submit" class="button button--primary">登録</button>
    <button type="button" class="button button--secondary" id="modal-close-btn">キャンセル</button>
  </div>
</form>
